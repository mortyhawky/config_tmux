############################################
##  SETTINGS
############################################
set -g base-index 1
setw -g pane-base-index 1
set-option -g focus-events on
set-option -g mode-keys vi


############################################
##  BINDINGS
############################################
# Alt+w to open a new workspace
bind-key -n M-w new-window
# Alt+[1,2,3,4] to move to workspace
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4

# Alt-c to enter copy-mode
bind -n M-c copy-mode
# Start selection with v as in vim
bind -T copy-mode-vi v send -X begin-selection
# Yank with y as in vim
bind -T copy-mode-vi y send -X copy-selection-and-cancel
# Put with p as in vim
bind -n M-p paste-buffer

# Alt + | (pipe) to split vertically
bind -n M-| split-window -h \; display-message "Alt + |"
#  Alt + - (dash) to split horizontally
bind -n M-- split-window -v \; display-message "Alt + -"

# Alt + hjkl naviagates panes
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-h select-pane -L
bind -n M-l select-pane -R

# Alt + arrows resize panes
bind -n M-Down  resize-pane -D 1
bind -n M-Up    resize-pane -U 1
bind -n M-Left  resize-pane -L 1
bind -n M-Right resize-pane -R 1

# Alt+r to Reload tmux.conf
bind -n M-r source-file ~/.config/tmux/tmux.conf \; display-message "Reloaded Tmux"

 
############################################
##  STATUS LINE
############################################
# Same blue color as the default DWM bar
#set -g status-bg "#005577"
set -g status-bg "#222222"
# Same white color as the default DWM foreground
set -g status-fg "#eeeeee"
set -g status-left  "#[bg=#000000,fg=#eeeeee] #S "
set -g status-right "#[bg=#000000,fg=#eeeeee] %Y-%m-%d %H:%M %a "
